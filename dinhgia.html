<!DOCTYPE html>
<html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Định giá Cổ phiếu</title>
    <script src="highcharts/highcharts.js"></script>
    <script src="highcharts/accessibility.js"></script>
    <script src="highcharts/highcharts-more.js"></script>
</head>
<style>
body {
    font-family: Helvetica Neue, Helvetica, Arial, sans-serif !important;
    text-align: center;
    padding: 10px;
    font-size: 14px;
    background: white;
    color: black;
}

/* ===== DARK MODE KHI html có theme="dark" ===== */
html[theme="dark"] body {
    background-color: #272d34;
    color: #d1d4dc !important;
}

html[theme="dark"] select,
html[theme="dark"] option,
html[theme="dark"] input[type="text"],
html[theme="dark"] input[type="number"] {
    background-color: #272d34;
    color: #ffffff;
    border-radius: 4px;
    border: 1px solid #555;
    padding: 4px 6px;
}

/* Hover */
html[theme="dark"] select:hover {
    border-color: #666;
}

/* Focus */
html[theme="dark"] select:focus {
    outline: none;
    border-color: #888;
    background-color: #2f353d;
}

/* Option selected */
html[theme="dark"] option:checked {
    background-color: #3a4149;
    color: #ffffff;
}

/* ===== STYLE CHUNG ===== */

select,
option,
input[type="text"],
input[type="number"] {
    padding: 4px 6px;
    border-radius: 4px;
    border: 1px solid #444;
}

.container {
    display: flex;
    justify-content: center;
}

.titlestyle {
    font-size: 15px;
    font-weight: 600;
    text-align: left;
}

/* Responsive */
@media (max-width: 768px) {
    .container {
        display: block;
    }
}

</style>
<link rel="stylesheet" type="text/css" href="loading.css">

<body>
    <div class="container">
        <div id="container" class="tactical" style="width:100%; height: calc(-74px + 100vh);"></div>
        <div id="bieudo" class="tactical" style="width:100%; height: calc(-74px + 100vh)"></div>
    </div>
    <div id="load"></div>
    <div style="text-align:center;" class="optionbox" style="display:none;">
        <input placeholder="Mã" style="width: 60px;display:none" title="Nhập và nhấn Enter" value="HPG" type="text" autocomplete="off" id="inputField" maxlength="3" />
        <select id="opt" title="Định giá bằng phương pháp nào?">
            <option value="PB">P/B</option>
            <option value="PE">P/E</option>
        </select>
        <select id="opt2" title="Khoảng thời gian báo cáo?">
            <option value="90">90 ngày</option>
            <option value="180">180 ngày</option>
        </select>
    </div>
    <script src="dinhgia.js"></script>
</body>

</html>
